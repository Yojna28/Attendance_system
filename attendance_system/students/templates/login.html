{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login - iStudent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, rgba(45, 179, 74, 0.15), rgba(247, 143, 30, 0.15)),
        url("{% static 'images/wmremove-transformed.png' %}") no-repeat center center/cover;
      min-height: 100vh;
    }

    header {
      background: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .logo {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(45deg, #2db34a, #f78f1e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    .btn {
      padding: 8px 18px;
      border: none;
      cursor: pointer;
      border-radius: 25px;
      font-weight: bold;
      color: white;
    }

    .btn-login {
      background: linear-gradient(135deg, #2f2f2f, #555);
    }

    .btn-register {
      background: linear-gradient(135deg, #f78f1e, #ffb347);
    }

    .main {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 80px 20px;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #2db34a, #f78f1e);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }

    .login-box p {
      margin-top: 15px;
      font-size: 14px;
    }

    .login-box a {
      color: #2db34a;
      text-decoration: none;
      font-weight: 600;
    }

    .messages {
      color: red;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <div class="logo">iSTUDENT</div>
    <nav>
      <a href="{% url 'home' %}">Home</a>
      
      
      <a href="{% url 'register' %}">
        <button class="btn btn-register">
          <i class="fas fa-user-plus"></i> Register
        </button>
      </a>
    </nav>
  </header>

  <!-- Login Section -->
  <div class="main">
    <div class="login-box">
      <h2>Login to iStudent</h2>

      <!-- Messages -->
      {% if messages %}
        {% for message in messages %}
          <div class="messages">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <p>Don’t have an account? 
        <a href="{% url 'register' %}">Register Here</a>
      </p>
    </div>
  </div>

</body>
</html>
